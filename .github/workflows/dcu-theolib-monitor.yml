name: DCU Theology Library New Arrival Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          INCLUDE_TEXT: ${{ secrets.INCLUDE_TEXT }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DETAIL_LINK_SELECTOR: ${{ secrets.DETAIL_LINK_SELECTOR }}
          PAGE_WAIT_MS: ${{ secrets.PAGE_WAIT_MS }}
          MAX_ITEMS: ${{ secrets.MAX_ITEMS }}
          HEADLESS: "true"
        run: python dcu_theolib_monitor.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dcu-theolib-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated state file
        run: |
          if git diff --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "chore: update monitor state [skip ci]"
          git push
